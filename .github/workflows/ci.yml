name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Correctness across the full support matrix (fast tests only).
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (excluding slow simulations)
        run: pytest -q -m "not slow"

      - name: muteval self-check (the example must produce a score)
        run: muteval run --config examples/support_bot/muteval_config.py --no-color

  # Statistical rigor: coverage gate + reference cross-checks + Monte-Carlo
  # coverage. Runs once (heaviest job), Linux + one Python.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev + verify extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,verify]"
      - name: Reference cross-checks + slow simulations
        run: pytest -q tests/test_stats_reference.py tests/test_ci_coverage.py
      - name: Coverage gate (>=90%, ROADMAP §7.5)
        run: |
          coverage run --source=src/muteval -m pytest -q -m "not slow"
          coverage report --fail-under=90
